name: Deploy Convex

on:
  push:
    branches: [main]
    paths:
      - "convex/**"
      - "cli/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-convex.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npx convex deploy --yes
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

  publish-cli:
    runs-on: ubuntu-latest
    needs: deploy
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cli/package-lock.json
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run typecheck

      - run: npm pack --dry-run

      - name: Check npm version
        id: npm-version
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if NPM_CONFIG_USERCONFIG=/dev/null npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is not published yet"
          fi

      - name: Publish CLI
        if: steps.npm-version.outputs.published == 'false'
        run: npm publish
