name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --loglevel=error

      - name: Check cl-sdk version
        run: npm run check:cl-sdk-version

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Typecheck Next.js
        run: npx tsc --noEmit --incremental false

      - name: Typecheck Convex
        run: npx convex typecheck

      - name: Build
        run: npm run build

  workers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Build extraction worker
        working-directory: extraction-worker
        run: npm ci --include=dev --no-audit --no-fund --loglevel=error && npm run build

      - name: Build iMessage worker
        working-directory: imessage-worker
        run: npm ci --include=dev --no-audit --no-fund --loglevel=error && npm run build

      - name: Build MCP server
        working-directory: mcp-server
        run: npm ci --include=dev --no-audit --no-fund --loglevel=error && npm run build

      - name: Syntax-check mailbox scan worker
        run: node --check mailbox-scan-worker/src/index.js

  packages:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - cli
          - operator-cli
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --loglevel=error

      - name: Typecheck
        run: npm run typecheck
